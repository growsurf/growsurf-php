name: Release Please

# Opens/updates a release PR as conventional-commit changes land on main, and
# creates the GitHub release + tag when that PR is merged. The Sync Packagist
# workflow publishes that release to Packagist and verifies the Composer
# metadata. Replaces the retired Stainless release pipeline (uses the existing
# release-please-config.json + manifest).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.repository == 'growsurf/growsurf-php'
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
